<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="styleBarrier.css">
</head>
<body>

<!-- ==================== HEADER NAVIGASI ==================== -->

    <div class="header-container">
        <!-- Logo Section -->
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-traffic-light"></i>
            </div>
            <div class="logo-text">
                <span class="logo-title">DISHUB</span>
                <span class="logo-subtitle">Dinas Perhubungan</span>
            </div>
        </div>

        <!-- Desktop Navigation -->
        <nav class="nav-menu">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="index.html" class="nav-link" id="berandaLink">
                        <i class="fas fa-home"></i>
                        <span>Beranda</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="index.html#layanan" class="nav-link" id="layananLink">
                        <i class="fas fa-concierge-bell"></i>
                        <span>Layanan</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="#" class="nav-link" id="peminjamanLink">
                        <i class="fas fa-road-barrier"></i>
                        <span>Peminjaman</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Right Actions -->
        <div class="header-actions">
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i>
            </button>
            <button class="contact-btn" id="contactBtn">
                <i class="fas fa-headset"></i>
                <span>Hubungi Kami</span>
            </button>
        </div>

        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
    </div>

    <!-- Mobile Dropdown -->
    <div class="mobile-menu" id="mobileMenu">
        <ul class="mobile-nav-list">
            <li class="mobile-nav-item">
                <a href="index.html" class="mobile-nav-link" id="mobileBeranda">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
            </li>
            <li class="mobile-nav-item">
                <a href="index.html#layanan" class="mobile-nav-link" id="mobileLayanan">
                    <i class="fas fa-concierge-bell"></i>
                    <span>Layanan</span>
                </a>
            </li>
            <li class="mobile-nav-item active">
                <a href="#" class="mobile-nav-link" id="mobilePeminjaman">
                    <i class="fas fa-road-barrier"></i>
                    <span>Peminjaman</span>
                </a>
            </li>
        </ul>
        <div class="mobile-contact">
            <button class="mobile-contact-btn">
                <i class="fas fa-headset"></i>
                Hubungi Kami
            </button>
        </div>
    </div>
</header>

<!-- ==================== KONTEN UTAMA ==================== -->
<main class="main-content">
    <!-- Halaman Peminjaman (Form) -->
    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-road-barrier"></i>
            <h2>Form Peminjaman Road Barrier</h2>
            <p>Isi data dengan lengkap dan benar untuk proses peminjaman</p>
        </div>

        <form id="rentalForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label><i class="fas fa-user"></i> Nama Lengkap <span class="required">*</span></label>
                    <input type="text" id="fullname" name="fullname" placeholder="Contoh: Azwar Wijaya" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone-alt"></i> Nomor Telepon/WA <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="081234567890" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-home"></i> Kelurahan/Desa <span class="required">*</span></label>
                    <input type="text" id="village" name="village" placeholder="Kelurahan Asambu" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Kecamatan <span class="required">*</span></label>
                    <input type="text" id="district" name="district" placeholder="Kecamatan Unaaha" required>
                </div>

                <div class="form-group full-width">
                    <label><i class="fas fa-location-dot"></i> Alamat Lengkap <span class="required">*</span></label>
                    <textarea id="address" name="address" rows="3" placeholder="Jl. Contoh No. 123, RT/RW ..." required></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-chalkboard-user"></i> Jumlah Road Barrier <span class="required">*</span></label>
                    <input type="number" id="quantity" name="quantity" min="1" max="100" value="1" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-clipboard-list"></i> Tujuan Peminjaman <span class="required">*</span></label>
                    <select id="purpose" name="purpose" required>
                        <option value="">Pilih tujuan</option>
                        <option value="Event Jalan Sehat">Event Jalan Sehat</option>
                        <option value="Perbaikan Jalan">Perbaikan Jalan</option>
                        <option value="Pengamanan Demo">Pengamanan Demo</option>
                        <option value="Penutupan Akses Sementara">Penutupan Akses Sementara</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Tanggal Mulai <span class="required">*</span></label>
                    <input type="text" id="startDate" name="startDate" placeholder="Pilih tanggal" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-check"></i> Tanggal Selesai <span class="required">*</span></label>
                    <input type="text" id="endDate" name="endDate" placeholder="Pilih tanggal" required>
                </div>

                <div class="form-group full-width">
                    <label><i class="fas fa-id-card"></i> Upload KTP/E-KTP (Max 2MB, JPG/PNG/PDF) <span class="required">*</span></label>
                    <div class="file-input-wrapper">
                        <input type="file" id="ktpUpload" name="ktpUpload" accept=".jpg,.jpeg,.png,.pdf" required>
                        <button type="button" id="clearFileBtn" class="clear-btn" style="display: none;">
                            <i class="fas fa-trash-alt"></i> Hapus File
                        </button>
                    </div>
                    <div id="fileInfo" class="file-info"></div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Ajukan Peminjaman
                </button>
                <button type="reset" class="btn-reset">
                    <i class="fas fa-undo-alt"></i> Reset Form
                </button>
            </div>
            <div id="formMessage" class="form-message"></div>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>
<script src="scriptBarrier.js"></script>
</body>
</html>
